<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AndreaOS</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --bg2: #111113;
  --bg3: #19191d;
  --bg4: #222228;
  --text: #e8e8ed;
  --text2: #9898a4;
  --text3: #5a5a6a;
  --accent: #00e599;
  --accent2: #00b876;
  --accent-glow: rgba(0,229,153,0.15);
  --red: #ff4d6a;
  --red-glow: rgba(255,77,106,0.12);
  --orange: #ff9f43;
  --orange-glow: rgba(255,159,67,0.12);
  --blue: #4dabf7;
  --blue-glow: rgba(77,171,247,0.12);
  --yellow: #ffd43b;
  --purple: #b197fc;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 20px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: sticky; top:0; z-index:100;
  background: rgba(10,10,11,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
.header-date { font-size: 13px; color: var(--text3); font-weight: 400; }

/* NAV TABS */
.nav {
  display: flex; gap: 4px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky; top: 57px; z-index: 99;
  background: rgba(10,10,11,0.9);
  backdrop-filter: blur(16px);
}
.nav::-webkit-scrollbar { display:none; }
.nav-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--bg2);
  color: var(--text2);
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-btn.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 600;
}
.nav-btn:not(.active):hover { background: var(--bg3); }

/* SECTIONS */
.section { display:none; padding: 16px; padding-bottom: 100px; }
.section.active { display:block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.section-title {
  font-size: 13px; font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
}

/* NUMERI (KPI CARDS) */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.kpi-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 20px 16px;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.kpi-card.green::before { background: var(--accent); }
.kpi-card.orange::before { background: var(--orange); }
.kpi-card.blue::before { background: var(--blue); }
.kpi-card.purple::before { background: var(--purple); }
.kpi-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; }
.kpi-card.green .kpi-value { color: var(--accent); }
.kpi-card.orange .kpi-value { color: var(--orange); }
.kpi-card.blue .kpi-value { color: var(--blue); }
.kpi-card.purple .kpi-value { color: var(--purple); }

/* PROGRESS BAR */
.progress-wrap { margin-bottom: 24px; }
.progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-info span { font-size: 12px; color: var(--text2); }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-fill { height:100%; background: linear-gradient(90deg, var(--accent), var(--blue)); border-radius:3px; transition: width 0.5s ease; }

/* PIPELINE */
.pipeline-filters {
  display: flex; gap: 6px; overflow-x: auto; margin-bottom: 16px;
  scrollbar-width: none; padding-bottom: 4px;
}
.pipeline-filters::-webkit-scrollbar { display:none; }
.pipe-filter {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--bg2);
  color: var(--text3);
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all 0.2s;
}
.pipe-filter.active { background: var(--bg4); color: var(--text); border-color: rgba(255,255,255,0.12); }
.pipe-filter .count {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 10px;
  margin-left: 4px;
}

/* CLIENT CARDS */
.client-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  position: relative;
  transition: all 0.2s;
}
.client-card:active { transform: scale(0.98); }
.client-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.client-name { font-weight: 600; font-size: 15px; }
.client-amount { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 14px; color: var(--accent); }
.client-type { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
.client-bottom { display: flex; justify-content: space-between; align-items: center; }
.client-status {
  font-size: 11px; font-weight: 600;
  padding: 4px 10px;
  border-radius: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-contatto { background: var(--blue-glow); color: var(--blue); }
.status-preventivo { background: var(--orange-glow); color: var(--orange); }
.status-confermato { background: var(--accent-glow); color: var(--accent); }
.status-lavorazione { background: rgba(177,151,252,0.12); color: var(--purple); }
.status-fatturare { background: var(--red-glow); color: var(--red); }
.status-chiuso { background: rgba(255,255,255,0.06); color: var(--text3); }
.client-days { font-size: 11px; color: var(--text3); }
.client-days.warning { color: var(--orange); }
.client-days.danger { color: var(--red); }

/* PROJECT CARDS */
.project-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
}
.project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.project-name { font-weight: 600; font-size: 15px; }
.project-status {
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.pstatus-attivo { background: var(--accent-glow); color: var(--accent); }
.pstatus-pausa { background: var(--orange-glow); color: var(--orange); }
.pstatus-bloccato { background: var(--red-glow); color: var(--red); }
.project-action {
  font-size: 13px; color: var(--text2);
  padding: 10px 12px;
  background: var(--bg3);
  border-radius: var(--radius-sm);
  margin-top: 8px;
  border-left: 3px solid var(--accent);
}
.project-deadline { font-size: 11px; color: var(--text3); margin-top: 8px; }

/* FOCUS */
.focus-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  display: flex; align-items: flex-start; gap: 14px;
  transition: all 0.2s;
}
.focus-check {
  width: 24px; height: 24px; flex-shrink: 0;
  border: 2px solid var(--text3);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
  margin-top: 1px;
}
.focus-check.done {
  background: var(--accent);
  border-color: var(--accent);
}
.focus-check.done::after {
  content: '✓'; color: var(--bg); font-size: 13px; font-weight: 700;
}
.focus-card.done { opacity: 0.4; }
.focus-card.done .focus-text { text-decoration: line-through; }
.focus-text { flex:1; }
.focus-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.focus-source { font-size: 11px; color: var(--text3); }
.focus-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px; font-weight: 700;
  color: var(--text3);
  opacity: 0.3;
}
.focus-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 14px;
}

/* FAB */
.fab {
  position: fixed;
  bottom: 24px; right: 20px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  font-size: 28px; font-weight: 300;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,229,153,0.3);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.fab:active { transform: scale(0.9); }

/* MODAL */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 300;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display:flex; animation: fadeIn 0.2s ease; }
.modal {
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  width: 100%; max-width: 500px;
  max-height: 85dvh;
  overflow-y: auto;
  padding: 24px 20px 40px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal h2 {
  font-size: 18px; font-weight: 700;
  margin-bottom: 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.modal-close {
  background: var(--bg3); border:none; color: var(--text2);
  width: 32px; height: 32px; border-radius: 50%;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* FORM */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 6px; display:block; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
}
.form-select { appearance: none; cursor: pointer; }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-primary:active { transform: scale(0.97); }

.btn-danger {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--red);
  border: 1px solid rgba(255,77,106,0.2);
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
}

/* STATUS SELECT COLORS */
.form-select option { background: var(--bg3); color: var(--text); }

/* SWIPE ACTIONS */
.card-actions {
  display: flex; gap: 8px; margin-top: 12px;
  padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.04);
}
.card-action {
  flex:1; padding: 8px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--bg3);
  color: var(--text2);
  font-size: 11px; font-weight: 500;
  text-align: center;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all 0.15s;
}
.card-action:active { transform: scale(0.95); }
.card-action.advance { border-color: rgba(0,229,153,0.2); color: var(--accent); }
.card-action.edit { border-color: rgba(77,171,247,0.2); color: var(--blue); }
.card-action.delete { border-color: rgba(255,77,106,0.15); color: var(--red); }

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--text3);
}
.empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

@media(min-width:600px) {
  .section { max-width: 540px; margin: 0 auto; }
  .kpi-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>AndreaOS_</h1>
  <div class="header-date" id="headerDate"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" data-tab="numeri">Numeri</button>
  <button class="nav-btn" data-tab="pipeline">Pipeline</button>
  <button class="nav-btn" data-tab="progetti">Progetti</button>
  <button class="nav-btn" data-tab="focus">Focus</button>
</div>

<!-- NUMERI -->
<div class="section active" id="sec-numeri">
  <div class="kpi-grid">
    <div class="kpi-card green">
      <div class="kpi-label">Incassato</div>
      <div class="kpi-value" id="kpiIncassato">€0</div>
    </div>
    <div class="kpi-card orange">
      <div class="kpi-label">In attesa</div>
      <div class="kpi-value" id="kpiAttesa">€0</div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">Preventivi</div>
      <div class="kpi-value" id="kpiPreventivi">€0</div>
    </div>
    <div class="kpi-card purple">
      <div class="kpi-label">Obiettivo</div>
      <div class="kpi-value" id="kpiObiettivo">€3000</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span>Progresso mese</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
  <div class="section-title">Riepilogo pipeline</div>
  <div id="numeriSummary"></div>
</div>

<!-- PIPELINE -->
<div class="section" id="sec-pipeline">
  <div class="pipeline-filters" id="pipeFilters"></div>
  <div id="pipelineList"></div>
</div>

<!-- PROGETTI -->
<div class="section" id="sec-progetti">
  <div id="progettiList"></div>
</div>

<!-- FOCUS -->
<div class="section" id="sec-focus">
  <div class="section-title">Oggi — max 3 task</div>
  <div id="focusList"></div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===================== FIREBASE CONFIG =====================
const firebaseConfig = {
  apiKey: "AIzaSyCs7Gpx9uZk3Zr_UOGbyfa_EL9MjfSrVUE",
  authDomain: "andreaos-a7a3b.firebaseapp.com",
  databaseURL: "https://andreaos-a7a3b-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "andreaos-a7a3b",
  storageBucket: "andreaos-a7a3b.firebasestorage.app",
  messagingSenderId: "518638530790",
  appId: "1:518638530790:web:c905ec955c932c019bcb27"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===================== STATE =====================
let clients = {};
let projects = {};
let focusTasks = {};
let settings = { obiettivo: 3000 };
let currentTab = 'numeri';
let currentPipeFilter = 'tutti';
let expandedCards = {};

const STATUSES = [
  { key: 'contatto', label: 'Contatto', css: 'status-contatto' },
  { key: 'preventivo', label: 'Preventivo', css: 'status-preventivo' },
  { key: 'confermato', label: 'Confermato', css: 'status-confermato' },
  { key: 'lavorazione', label: 'In lavorazione', css: 'status-lavorazione' },
  { key: 'fatturare', label: 'Da fatturare', css: 'status-fatturare' },
  { key: 'chiuso', label: 'Chiuso', css: 'status-chiuso' }
];

const PROJECT_STATUSES = [
  { key: 'attivo', label: 'Attivo', css: 'pstatus-attivo' },
  { key: 'pausa', label: 'In pausa', css: 'pstatus-pausa' },
  { key: 'bloccato', label: 'Bloccato', css: 'pstatus-bloccato' }
];

// ===================== INIT =====================
function init() {
  updateDate();
  setupNav();
  setupFab();
  setupModal();
  listenData();
}

function updateDate() {
  const d = new Date();
  const opts = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById('headerDate').textContent = d.toLocaleDateString('it-IT', opts);
}

// ===================== NAV =====================
function setupNav() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('sec-' + currentTab).classList.add('active');
    });
  });
}

// ===================== FAB =====================
function setupFab() {
  document.getElementById('fabBtn').addEventListener('click', () => {
    if (currentTab === 'pipeline') openClientModal();
    else if (currentTab === 'progetti') openProjectModal();
    else if (currentTab === 'focus') openFocusModal();
    else if (currentTab === 'numeri') openSettingsModal();
  });
}

// ===================== MODAL =====================
function setupModal() {
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
}
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ===================== FIREBASE LISTENERS =====================
function listenData() {
  db.ref('clients').on('value', snap => { clients = snap.val() || {}; render(); });
  db.ref('projects').on('value', snap => { projects = snap.val() || {}; render(); });
  db.ref('focus').on('value', snap => { focusTasks = snap.val() || {}; render(); });
  db.ref('settings').on('value', snap => { settings = snap.val() || { obiettivo: 3000 }; render(); });
}

// ===================== RENDER =====================
function render() {
  renderNumeri();
  renderPipeline();
  renderProgetti();
  renderFocus();
}

// ---------- NUMERI ----------
function renderNumeri() {
  const cl = Object.values(clients);
  const now = new Date();
  const month = now.getMonth();
  const year = now.getFullYear();

  let incassato = 0, attesa = 0, preventivi = 0;
  cl.forEach(c => {
    const amt = parseFloat(c.amount) || 0;
    if (c.status === 'chiuso') {
      const d = c.closedDate ? new Date(c.closedDate) : null;
      if (d && d.getMonth() === month && d.getFullYear() === year) incassato += amt;
    }
    if (c.status === 'fatturare' || c.status === 'lavorazione') attesa += amt;
    if (c.status === 'preventivo') preventivi += amt;
  });

  const obiettivo = settings.obiettivo || 3000;
  document.getElementById('kpiIncassato').textContent = '€' + incassato.toLocaleString('it-IT');
  document.getElementById('kpiAttesa').textContent = '€' + attesa.toLocaleString('it-IT');
  document.getElementById('kpiPreventivi').textContent = '€' + preventivi.toLocaleString('it-IT');
  document.getElementById('kpiObiettivo').textContent = '€' + obiettivo.toLocaleString('it-IT');

  const pct = obiettivo > 0 ? Math.min(100, Math.round((incassato / obiettivo) * 100)) : 0;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // Summary
  const counts = {};
  STATUSES.forEach(s => counts[s.key] = 0);
  cl.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });

  let summaryHtml = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  STATUSES.forEach(s => {
    summaryHtml += `<div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,0.04);">
      <span style="font-size:12px;color:var(--text2)">${s.label}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600">${counts[s.key]}</span>
    </div>`;
  });
  summaryHtml += '</div>';
  document.getElementById('numeriSummary').innerHTML = summaryHtml;
}

// ---------- PIPELINE ----------
function renderPipeline() {
  const cl = Object.entries(clients);
  // Filters
  const counts = { tutti: cl.length };
  STATUSES.forEach(s => counts[s.key] = 0);
  cl.forEach(([,c]) => { if (counts[c.status] !== undefined) counts[c.status]++; });

  let filtersHtml = `<button class="pipe-filter ${currentPipeFilter==='tutti'?'active':''}" onclick="setPipeFilter('tutti')">Tutti <span class="count">${counts.tutti}</span></button>`;
  STATUSES.forEach(s => {
    filtersHtml += `<button class="pipe-filter ${currentPipeFilter===s.key?'active':''}" onclick="setPipeFilter('${s.key}')">${s.label} <span class="count">${counts[s.key]}</span></button>`;
  });
  document.getElementById('pipeFilters').innerHTML = filtersHtml;

  // Cards
  const filtered = cl.filter(([,c]) => currentPipeFilter === 'tutti' || c.status === currentPipeFilter);

  if (filtered.length === 0) {
    document.getElementById('pipelineList').innerHTML = `<div class="empty-state"><div class="emoji">📋</div><p>Nessun cliente qui.<br>Premi + per aggiungerne uno.</p></div>`;
    return;
  }

  let html = '';
  filtered.forEach(([id, c]) => {
    const days = daysSince(c.statusDate || c.created);
    const daysClass = days > 14 ? 'danger' : days > 7 ? 'warning' : '';
    const statusInfo = STATUSES.find(s => s.key === c.status) || STATUSES[0];
    const expanded = expandedCards[id];
    const nextStatus = getNextStatus(c.status);

    html += `<div class="client-card" onclick="toggleCard('${id}')">
      <div class="client-top">
        <div class="client-name">${esc(c.name)}</div>
        <div class="client-amount">€${(parseFloat(c.amount)||0).toLocaleString('it-IT')}</div>
      </div>
      <div class="client-type">${esc(c.type || '')}</div>
      <div class="client-bottom">
        <span class="client-status ${statusInfo.css}">${statusInfo.label}</span>
        <span class="client-days ${daysClass}">${days}g in questo stato</span>
      </div>
      ${expanded ? `<div class="card-actions">
        ${nextStatus ? `<button class="card-action advance" onclick="event.stopPropagation();advanceClient('${id}','${nextStatus.key}')">→ ${nextStatus.label}</button>` : ''}
        <button class="card-action edit" onclick="event.stopPropagation();openClientModal('${id}')">Modifica</button>
        <button class="card-action delete" onclick="event.stopPropagation();deleteClient('${id}')">Elimina</button>
      </div>` : ''}
    </div>`;
  });
  document.getElementById('pipelineList').innerHTML = html;
}

function setPipeFilter(f) { currentPipeFilter = f; renderPipeline(); }
function toggleCard(id) { expandedCards[id] = !expandedCards[id]; render(); }

function getNextStatus(current) {
  const idx = STATUSES.findIndex(s => s.key === current);
  return idx < STATUSES.length - 1 ? STATUSES[idx + 1] : null;
}

function advanceClient(id, newStatus) {
  db.ref('clients/' + id).update({ status: newStatus, statusDate: new Date().toISOString() });
  if (newStatus === 'chiuso') db.ref('clients/' + id).update({ closedDate: new Date().toISOString() });
}

function deleteClient(id) {
  if (confirm('Eliminare questo cliente?')) db.ref('clients/' + id).remove();
}

// ---------- PROGETTI ----------
function renderProgetti() {
  const pj = Object.entries(projects);
  if (pj.length === 0) {
    document.getElementById('progettiList').innerHTML = `<div class="empty-state"><div class="emoji">🚀</div><p>Nessun progetto attivo.<br>Premi + per aggiungerne uno.</p></div>`;
    return;
  }
  let html = '';
  pj.forEach(([id, p]) => {
    const si = PROJECT_STATUSES.find(s => s.key === p.status) || PROJECT_STATUSES[0];
    const expanded = expandedCards['p_'+id];
    html += `<div class="project-card" onclick="toggleCard('p_${id}')">
      <div class="project-header">
        <div class="project-name">${esc(p.name)}</div>
        <span class="project-status ${si.css}">${si.label}</span>
      </div>
      ${p.nextAction ? `<div class="project-action">→ ${esc(p.nextAction)}</div>` : ''}
      ${p.deadline ? `<div class="project-deadline">Entro: ${formatDate(p.deadline)}</div>` : ''}
      ${expanded ? `<div class="card-actions">
        <button class="card-action edit" onclick="event.stopPropagation();openProjectModal('${id}')">Modifica</button>
        <button class="card-action delete" onclick="event.stopPropagation();deleteProject('${id}')">Elimina</button>
      </div>` : ''}
    </div>`;
  });
  document.getElementById('progettiList').innerHTML = html;
}

function deleteProject(id) {
  if (confirm('Eliminare questo progetto?')) db.ref('projects/' + id).remove();
}

// ---------- FOCUS ----------
function renderFocus() {
  const today = new Date().toISOString().split('T')[0];
  const todayTasks = Object.entries(focusTasks).filter(([,f]) => f.date === today);

  if (todayTasks.length === 0) {
    document.getElementById('focusList').innerHTML = `<div class="focus-empty">Nessun task per oggi.<br>Premi + per impostare il focus.</div>`;
    return;
  }

  let html = '';
  todayTasks.forEach(([id, f], i) => {
    const done = f.done;
    html += `<div class="focus-card ${done?'done':''}">
      <div class="focus-check ${done?'done':''}" onclick="toggleFocus('${id}')"></div>
      <div class="focus-text">
        <div class="focus-title">${esc(f.title)}</div>
        <div class="focus-source">${esc(f.source || '')}</div>
      </div>
      <div class="focus-number">${i+1}</div>
    </div>`;
  });
  document.getElementById('focusList').innerHTML = html;
}

function toggleFocus(id) {
  const current = focusTasks[id];
  db.ref('focus/' + id).update({ done: !current.done });
}

// ===================== MODALS =====================
function openClientModal(editId) {
  const c = editId ? clients[editId] : null;
  const title = c ? 'Modifica Cliente' : 'Nuovo Cliente';
  let statusOpts = STATUSES.map(s => `<option value="${s.key}" ${c && c.status===s.key?'selected':''}>${s.label}</option>`).join('');

  openModal(`
    <h2>${title} <button class="modal-close" onclick="closeModal()">×</button></h2>
    <div class="form-group"><label class="form-label">Nome</label><input class="form-input" id="mName" value="${c?esc(c.name):''}" placeholder="Nome cliente"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Importo €</label><input class="form-input" id="mAmount" type="number" value="${c?c.amount:''}" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Stato</label><select class="form-select" id="mStatus">${statusOpts}</select></div>
    </div>
    <div class="form-group"><label class="form-label">Tipo lavoro</label><input class="form-input" id="mType" value="${c?esc(c.type||''):''}" placeholder="Video, Foto, Contenuti..."></div>
    <div class="form-group"><label class="form-label">Note</label><textarea class="form-textarea" id="mNotes" placeholder="Note opzionali...">${c?esc(c.notes||''):''}</textarea></div>
    <button class="btn-primary" onclick="saveClient('${editId||''}')">Salva</button>
    ${editId ? `<button class="btn-danger" onclick="deleteClient('${editId}');closeModal()">Elimina cliente</button>` : ''}
  `);
}

function saveClient(editId) {
  const data = {
    name: document.getElementById('mName').value.trim(),
    amount: document.getElementById('mAmount').value,
    status: document.getElementById('mStatus').value,
    type: document.getElementById('mType').value.trim(),
    notes: document.getElementById('mNotes').value.trim(),
    statusDate: new Date().toISOString()
  };
  if (!data.name) return;

  if (editId) {
    db.ref('clients/' + editId).update(data);
  } else {
    data.created = new Date().toISOString();
    db.ref('clients').push(data);
  }
  closeModal();
}

function openProjectModal(editId) {
  const p = editId ? projects[editId] : null;
  const title = p ? 'Modifica Progetto' : 'Nuovo Progetto';
  let statusOpts = PROJECT_STATUSES.map(s => `<option value="${s.key}" ${p && p.status===s.key?'selected':''}>${s.label}</option>`).join('');

  openModal(`
    <h2>${title} <button class="modal-close" onclick="closeModal()">×</button></h2>
    <div class="form-group"><label class="form-label">Nome progetto</label><input class="form-input" id="mPName" value="${p?esc(p.name):''}" placeholder="Es: Race Tracker, Martino..."></div>
    <div class="form-group"><label class="form-label">Stato</label><select class="form-select" id="mPStatus">${statusOpts}</select></div>
    <div class="form-group"><label class="form-label">Prossima azione</label><input class="form-input" id="mPAction" value="${p?esc(p.nextAction||''):''}" placeholder="Una sola cosa concreta"></div>
    <div class="form-group"><label class="form-label">Deadline</label><input class="form-input" id="mPDeadline" type="date" value="${p?p.deadline||'':''}"></div>
    <button class="btn-primary" onclick="saveProject('${editId||''}')">Salva</button>
    ${editId ? `<button class="btn-danger" onclick="deleteProject('${editId}');closeModal()">Elimina progetto</button>` : ''}
  `);
}

function saveProject(editId) {
  const data = {
    name: document.getElementById('mPName').value.trim(),
    status: document.getElementById('mPStatus').value,
    nextAction: document.getElementById('mPAction').value.trim(),
    deadline: document.getElementById('mPDeadline').value
  };
  if (!data.name) return;

  if (editId) {
    db.ref('projects/' + editId).update(data);
  } else {
    data.created = new Date().toISOString();
    db.ref('projects').push(data);
  }
  closeModal();
}

function openFocusModal() {
  const today = new Date().toISOString().split('T')[0];
  const todayCount = Object.values(focusTasks).filter(f => f.date === today).length;
  if (todayCount >= 3) {
    openModal(`
      <h2>Focus pieno <button class="modal-close" onclick="closeModal()">×</button></h2>
      <p style="color:var(--text2);text-align:center;padding:20px 0;">Hai già 3 task per oggi.<br>Completane uno prima di aggiungerne altri.</p>
    `);
    return;
  }

  // Quick picks from pipeline + projects
  let picks = '';
  Object.entries(clients).forEach(([id, c]) => {
    if (c.status !== 'chiuso') {
      picks += `<option value="Cliente: ${esc(c.name)}">Cliente: ${esc(c.name)}</option>`;
    }
  });
  Object.entries(projects).forEach(([id, p]) => {
    picks += `<option value="Progetto: ${esc(p.name)}">Progetto: ${esc(p.name)}</option>`;
  });

  openModal(`
    <h2>Nuovo Focus <button class="modal-close" onclick="closeModal()">×</button></h2>
    <div class="form-group"><label class="form-label">Cosa devi fare</label><input class="form-input" id="mFTitle" placeholder="Es: Inviare preventivo a Mario"></div>
    <div class="form-group"><label class="form-label">Collegato a</label>
      <select class="form-select" id="mFSource"><option value="">— Nessuno —</option>${picks}</select>
    </div>
    <button class="btn-primary" onclick="saveFocus()">Aggiungi al focus</button>
  `);
}

function saveFocus() {
  const title = document.getElementById('mFTitle').value.trim();
  if (!title) return;
  const data = {
    title: title,
    source: document.getElementById('mFSource').value,
    date: new Date().toISOString().split('T')[0],
    done: false
  };
  db.ref('focus').push(data);
  closeModal();
}

function openSettingsModal() {
  openModal(`
    <h2>Impostazioni <button class="modal-close" onclick="closeModal()">×</button></h2>
    <div class="form-group"><label class="form-label">Obiettivo mensile €</label><input class="form-input" id="mObiettivo" type="number" value="${settings.obiettivo||3000}"></div>
    <button class="btn-primary" onclick="saveSettings()">Salva</button>
  `);
}

function saveSettings() {
  const o = parseInt(document.getElementById('mObiettivo').value) || 3000;
  db.ref('settings').set({ obiettivo: o });
  closeModal();
}

// ===================== HELPERS =====================
function daysSince(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / (1000*60*60*24));
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('it-IT', { day:'numeric', month:'short' });
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// ===================== START =====================
init();
</script>
</body>
</html>
